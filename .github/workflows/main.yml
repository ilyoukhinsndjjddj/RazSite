name: Auto Telegram Members Submitter

on:
  # قابلیت اجرا توسط وب‌هوک سایت کرون‌جاب
  repository_dispatch:
    types: [trigger-smm8]
  # قابلیت اجرای دستی مستقیم از پنل گیت‌هاب جهت تست
  workflow_dispatch:

jobs:
  submit_job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies for Playwright
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium
        playwright install-deps chromium

    - name: Run SMM8 Automation Script
      run: python script.py
